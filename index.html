<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sanad Repo | سورس سند</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#0A0E21;
--card:#161B33;
--accent:#6E4BF2;
--cyan:#00D9C0;
--text:#fff;
--sub:#8892B0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background-image:
radial-gradient(circle at 20% 20%,rgba(110,75,242,.25),transparent 45%),
radial-gradient(circle at 80% 80%,rgba(0,217,192,.15),transparent 45%);
}

.container{
width:100%;
max-width:520px;
text-align:center;
}

.logo{
font-size:80px;
margin-bottom:15px;
background:linear-gradient(135deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

h1{
font-size:32px;
margin-bottom:8px;
}

.subtitle{
color:var(--sub);
margin-bottom:30px;
font-size:14px;
}

.card{
background:rgba(22,27,51,.75);
backdrop-filter:blur(12px);
border:1px solid rgba(110,75,242,.25);
padding:25px;
border-radius:25px;
}

.btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px;
margin-bottom:12px;
border-radius:16px;
text-decoration:none;
color:#fff;
background:rgba(255,255,255,.04);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(110,75,242,.18);
}

.btn i:first-child{
color:var(--cyan);
font-size:20px;
margin-left:10px;
}

.btn span{
flex:1;
text-align:right;
}

.social{
margin-top:25px;
display:flex;
justify-content:center;
gap:12px;
}

.social a{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.05);
color:#fff;
transition:.25s;
text-decoration:none;
}

.social a:hover{
background:var(--accent);
transform:scale(1.08);
}

.footer{
margin-top:20px;
font-size:12px;
color:var(--sub);
}
</style>
</head>

<body>

<div class="container">

<i class="fa-solid fa-infinity logo"></i>

<h1>sanad Repo</h1>
<p class="subtitle">السورس الرسمي للأدوات، الثيمات والتعديلات</p>

<div class="card">

<a class="btn" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://sanad-1989.github.io/sanad/">
<i class="fa-solid fa-box-open"></i>
<span>إضافة إلى Cydia</span>
<i class="fa-solid fa-chevron-left"></i>
</a>

<a class="btn" href="sileo://source/https://sanad-1989.github.io/sanad/">
<i class="fa-solid fa-bolt"></i>
<span>إضافة إلى Sileo</span>
<i class="fa-solid fa-chevron-left"></i>
</a>

<a class="btn" href="zbra://sources/add/https://sanad-1989.github.io/sanad/">
<i class="fa-solid fa-horse-head"></i>
<span>إضافة إلى Zebra</span>
<i class="fa-solid fa-chevron-left"></i>
</a>

</div>

<div class="social">
<a href="#"><i class="fa-brands fa-x-twitter"></i></a>
<a href="#"><i class="fa-brands fa-telegram"></i></a>
<a href="#"><i class="fa-brands fa-discord"></i></a>
</div>

<p class="footer">© 2026 sanad Team</p>

</div>

</body>
</html>
